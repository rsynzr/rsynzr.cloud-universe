<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — rsynzr.cloud</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0b1220 0%, #0f1b3d 55%, #1a2f6b 100%);
      background-attachment: fixed;
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(10, 22, 48, 0.75);
      border: 1px solid rgba(59, 130, 246, 0.18);
      border-radius: 22px;
      padding: 2.75rem 2.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(59, 130, 246, 0.08),
        0 0 60px rgba(59, 130, 246, 0.07);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #60a5fa;
    }

    .card h1 {
      text-align: center;
      font-size: 1.65rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #e8f0fe;
      margin-bottom: 0.4rem;
    }

    .card-sub {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(148, 163, 184, 0.7);
      margin-bottom: 2rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.1rem;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.03em;
    }

    input {
      width: 100%;
      padding: 0.78rem 1rem;
      background: rgba(11, 18, 32, 0.8);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 11px;
      color: #e8f0fe;
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
    }

    input::placeholder {
      color: rgba(148, 163, 184, 0.35);
    }

    input:focus {
      border-color: rgba(96, 165, 250, 0.65);
      background: rgba(15, 27, 61, 0.9);
      box-shadow:
        0 0 0 3px rgba(59, 130, 246, 0.18),
        0 0 20px rgba(59, 130, 246, 0.12);
    }

    input:-webkit-autofill,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #0d1a3a inset, 0 0 0 3px rgba(59, 130, 246, 0.18);
      -webkit-text-fill-color: #e8f0fe;
      transition: background-color 9999s ease-in-out 0s;
    }

    .btn {
      width: 100%;
      padding: 0.85rem;
      margin-top: 0.5rem;
      border: none;
      border-radius: 11px;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      box-shadow:
        0 8px 28px rgba(37, 99, 235, 0.5),
        0 0 40px rgba(59, 130, 246, 0.25);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn.loading .spinner { display: block; }
    .btn.loading .btn-text { opacity: 0.7; }

    .message {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      border-radius: 9px;
      font-size: 0.83rem;
      font-weight: 500;
      text-align: center;
      display: none;
      animation: fadeUp 0.3s ease both;
    }

    .message.error {
      display: block;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .message.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.25);
      color: #86efac;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.4rem 0 1rem;
      color: rgba(148, 163, 184, 0.35);
      font-size: 0.78rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(59, 130, 246, 0.12);
    }

    .login-link {
      text-align: center;
      font-size: 0.84rem;
      color: rgba(148, 163, 184, 0.6);
    }

    .login-link a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    .login-link a:hover {
      color: #93c5fd;
      text-shadow: 0 0 12px rgba(96, 165, 250, 0.4);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="brand">rsynzr.cloud</div>
    <h1>Create Account</h1>
    <p class="card-sub">Join rsynzr.cloud to get started</p>

    <div class="field">
      <label for="email">Email address</label>
      <input
        type="email"
        id="email"
        placeholder="you@example.com"
        autocomplete="email"
      />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        placeholder="Minimum 6 characters"
        autocomplete="new-password"
      />
    </div>

    <button class="btn" id="registerBtn" onclick="register()">
      <div class="btn-inner">
        <div class="spinner"></div>
        <span class="btn-text">Sign Up</span>
      </div>
    </button>

    <div class="message" id="message"></div>

    <div class="divider">or</div>

    <p class="login-link">Already have an account? <a href="/login/">Log in</a></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQVXuqpkgOelSMhgg-I5QRokehHvm-c8M",
      authDomain: "rsynzr-cloud.firebaseapp.com",
      projectId: "rsynzr-cloud",
      appId: "1:284978411498:web:2e1a2abb680b0a86f4a493",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function showMessage(text, type) {
      const el = document.getElementById("message");
      el.textContent = text;
      el.className = "message " + type;
    }

    function setLoading(loading) {
      const btn = document.getElementById("registerBtn");
      btn.disabled = loading;
      if (loading) {
        btn.classList.add("loading");
      } else {
        btn.classList.remove("loading");
      }
    }

    window.register = async function () {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        showMessage("Please fill in all fields.", "error");
        return;
      }

      setLoading(true);

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        showMessage("Account created! Redirecting…", "success");
        setTimeout(() => { window.location.href = "/dashboard"; }, 1200);
      } catch (err) {
        let msg;
        switch (err.code) {
          case "auth/email-already-in-use":
            msg = "This email is already registered. Try logging in instead.";
            break;
          case "auth/weak-password":
            msg = "Password is too weak. Please use at least 6 characters.";
            break;
          case "auth/invalid-email":
            msg = "Please enter a valid email address.";
            break;
          case "auth/network-request-failed":
            msg = "Network error. Please check your connection and try again.";
            break;
          default:
            msg = "Something went wrong. Please try again.";
        }
        showMessage(msg, "error");
      } finally {
        setLoading(false);
      }
    };

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") window.register();
    });
  </script>

</body>
</html>
