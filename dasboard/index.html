<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — rsynzr.cloud</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(160deg, #0b1220 0%, #0f1b3d 55%, #1a2f6b 100%);
      background-attachment: fixed;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.75rem;
      height: 58px;
      background: rgba(11, 18, 32, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      flex-shrink: 0;
    }

    .navbar-logo {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      text-decoration: none;
      color: #fff;
    }

    .navbar-logo span {
      color: #60a5fa;
    }

    .navbar-home {
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      padding: 0.4rem 0.9rem;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .navbar-home:hover {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
    }

    /* ── BODY LAYOUT ── */
    .page-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      padding: 1.25rem 0.85rem;
      background: rgba(10, 20, 45, 0.5);
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      overflow-y: auto;
    }

    .sidebar-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
      padding: 0 0.5rem;
      margin-bottom: 0.25rem;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.87rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: background 0.2s, color 0.2s;
    }

    .tab-btn .tab-icon {
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.85);
    }

    .tab-btn.active {
      background: rgba(96, 165, 250, 0.18);
      color: #fff;
      border: 1px solid rgba(96, 165, 250, 0.25);
    }

    .tab-btn.danger {
      color: rgba(248, 113, 113, 0.65);
    }

    .tab-btn.danger:hover {
      background: rgba(248, 113, 113, 0.1);
      color: #fca5a5;
    }

    .tab-btn.danger.active {
      background: rgba(248, 113, 113, 0.15);
      border-color: rgba(248, 113, 113, 0.3);
      color: #fca5a5;
    }

    .tab-btn.accent {
      color: rgba(0, 255, 204, 0.65);
    }

    .tab-btn.accent:hover {
      background: rgba(0, 255, 204, 0.08);
      color: #00ffcc;
    }

    .sidebar-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 0.4rem 0;
    }

    /* ── CONTENT AREA ── */
    .content-area {
      flex: 1;
      padding: 1.75rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .content-panel {
      background: rgba(15, 27, 61, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 2rem 2.25rem;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      animation: fadeIn 0.3s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .content-panel h2 {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    .content-panel .panel-sub {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 1.5rem;
    }

    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.75rem;
      background: rgba(15, 27, 61, 0.4);
      border: 1px dashed rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 4rem 2rem;
      text-align: center;
    }

    .placeholder-icon {
      font-size: 2rem;
      opacity: 0.4;
    }

    .placeholder p {
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.92rem;
    }

    /* Settings */
    .settings-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.1rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 11px;
    }

    .settings-row-label {
      font-size: 0.88rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.75);
    }

    .settings-row-sub {
      font-size: 0.77rem;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 0.15rem;
    }

    .toggle {
      width: 40px;
      height: 22px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      position: relative;
      cursor: pointer;
      transition: background 0.25s;
      flex-shrink: 0;
    }

    .toggle.on {
      background: #3b82f6;
    }

    .toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: left 0.25s;
    }

    .toggle.on::after {
      left: 21px;
    }

    /* General Info */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .info-card {
      padding: 1rem 1.1rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 11px;
    }

    .info-card-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 0.3rem;
    }

    .info-card-value {
      font-size: 0.92rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
    }

    /* Action buttons */
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.4rem;
      border-radius: 10px;
      font-size: 0.87rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      text-decoration: none;
    }

    .action-btn:hover {
      transform: translateY(-2px);
    }

    .action-btn.blue {
      background: rgba(59, 130, 246, 0.2);
      border-color: rgba(59, 130, 246, 0.4);
      color: #93c5fd;
    }

    .action-btn.blue:hover {
      background: rgba(59, 130, 246, 0.32);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.25);
    }

    .action-btn.red {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.35);
      color: #fca5a5;
    }

    .action-btn.red:hover {
      background: rgba(239, 68, 68, 0.22);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.2);
    }

    .action-btn.orange {
      background: rgba(245, 158, 11, 0.12);
      border-color: rgba(245, 158, 11, 0.35);
      color: #fcd34d;
    }

    .action-btn.orange:hover {
      background: rgba(245, 158, 11, 0.22);
      box-shadow: 0 6px 20px rgba(245, 158, 11, 0.2);
    }

    .action-btn.green {
      background: rgba(0, 255, 204, 0.1);
      border-color: rgba(0, 255, 204, 0.3);
      color: #00ffcc;
    }

    .action-btn.green:hover {
      background: rgba(0, 255, 204, 0.18);
      box-shadow: 0 6px 20px rgba(0, 255, 204, 0.15);
    }

    .warning-box {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 11px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      font-size: 0.85rem;
      color: rgba(252, 165, 165, 0.85);
      line-height: 1.6;
    }

    .orange-box {
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 11px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      font-size: 0.85rem;
      color: rgba(253, 211, 77, 0.85);
      line-height: 1.6;
    }

    .coffee-hero {
      text-align: center;
      padding: 1rem 0 1.5rem;
    }

    .coffee-hero .coffee-emoji {
      font-size: 3rem;
      margin-bottom: 0.75rem;
    }

    .coffee-hero p {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
      max-width: 340px;
      margin: 0 auto 1.5rem;
      line-height: 1.6;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1rem 2rem;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.2);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      flex-shrink: 0;
    }

    /* ── MOBILE ── */
    .mobile-tabs {
      display: none;
      overflow-x: auto;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: rgba(10, 20, 45, 0.6);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .mobile-tabs::-webkit-scrollbar { display: none; }

    .mobile-tab-btn {
      flex-shrink: 0;
      padding: 0.45rem 0.9rem;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.8rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .mobile-tab-btn.active {
      background: rgba(96, 165, 250, 0.2);
      border-color: rgba(96, 165, 250, 0.4);
      color: #fff;
    }

    @media (max-width: 700px) {
      .sidebar { display: none; }
      .mobile-tabs { display: flex; }
      .content-area { padding: 1rem; }
      .info-grid { grid-template-columns: 1fr; }
      .content-panel { padding: 1.4rem 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="/" class="navbar-logo">rsynzr<span>.cloud</span></a>
    <a href="/" class="navbar-home">← Home</a>
  </div>

  <!-- MOBILE TABS -->
  <div class="mobile-tabs" id="mobileTabs"></div>

  <!-- PAGE BODY -->
  <div class="page-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-label">Menu</div>
      <button class="tab-btn" data-tab="settings" onclick="selectTab('settings', this)">
        <span class="tab-icon">⚙️</span> Settings
      </button>
      <button class="tab-btn" data-tab="general" onclick="selectTab('general', this)">
        <span class="tab-icon">👤</span> General Info
      </button>
      <div class="sidebar-divider"></div>
      <button class="tab-btn" data-tab="logout" onclick="selectTab('logout', this)">
        <span class="tab-icon">🚪</span> Logout
      </button>
      <button class="tab-btn" data-tab="switch" onclick="selectTab('switch', this)">
        <span class="tab-icon">🔄</span> Switch Account
      </button>
      <div class="sidebar-divider"></div>
      <button class="tab-btn danger" data-tab="delete" onclick="selectTab('delete', this)">
        <span class="tab-icon">🗑️</span> Delete Account
      </button>
      <button class="tab-btn danger" data-tab="deactivate" onclick="selectTab('deactivate', this)">
        <span class="tab-icon">⏸️</span> Deactivate Account
      </button>
      <div class="sidebar-divider"></div>
      <button class="tab-btn accent" data-tab="coffee" onclick="selectTab('coffee', this)">
        <span class="tab-icon">☕</span> Buy Me a Coffee
      </button>
    </aside>

    <!-- CONTENT -->
    <div class="content-area" id="contentArea">
      <div class="placeholder">
        <div class="placeholder-icon">🖱️</div>
        <p>Select a tab to view</p>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>© 2026 rsynzr.cloud. All rights reserved.</footer>

  <script>
    const tabs = [
      { id: 'settings',   label: '⚙️ Settings',           route: '/dashboard/settings' },
      { id: 'general',    label: '👤 General Info',        route: '/dashboard/general-info' },
      { id: 'logout',     label: '🚪 Logout',              route: '/dashboard/logout' },
      { id: 'switch',     label: '🔄 Switch Account',      route: '/dashboard/switch-account' },
      { id: 'delete',     label: '🗑️ Delete Account',      route: '/dashboard/delete-account' },
      { id: 'deactivate', label: '⏸️ Deactivate Account',  route: '/dashboard/deactivate-account' },
      { id: 'coffee',     label: '☕ Buy Me a Coffee',     route: 'https://donate.rsynzr.cloud' },
    ];

    const content = {
      settings: `
        <div class="content-panel">
          <h2>⚙️ Settings</h2>
          <p class="panel-sub">Manage your account preferences and security.</p>
          <div class="settings-group">
            <div class="settings-row">
              <div>
                <div class="settings-row-label">Email Notifications</div>
                <div class="settings-row-sub">Receive updates and alerts via email</div>
              </div>
              <div class="toggle on" onclick="this.classList.toggle('on')"></div>
            </div>
            <div class="settings-row">
              <div>
                <div class="settings-row-label">Two-Factor Authentication</div>
                <div class="settings-row-sub">Add an extra layer of security</div>
              </div>
              <div class="toggle" onclick="this.classList.toggle('on')"></div>
            </div>
            <div class="settings-row">
              <div>
                <div class="settings-row-label">Dark Mode</div>
                <div class="settings-row-sub">Always enabled for this theme</div>
              </div>
              <div class="toggle on" onclick="this.classList.toggle('on')"></div>
            </div>
            <div class="settings-row">
              <div>
                <div class="settings-row-label">Activity Log</div>
                <div class="settings-row-sub">Track login and account activity</div>
              </div>
              <div class="toggle" onclick="this.classList.toggle('on')"></div>
            </div>
          </div>
        </div>`,

      general: `
        <div class="content-panel">
          <h2>👤 General Info</h2>
          <p class="panel-sub">Your profile and account summary.</p>
          <div class="info-grid">
            <div class="info-card">
              <div class="info-card-label">Username</div>
              <div class="info-card-value">rsynzr</div>
            </div>
            <div class="info-card">
              <div class="info-card-label">Email</div>
              <div class="info-card-value">user@rsynzr.cloud</div>
            </div>
            <div class="info-card">
              <div class="info-card-label">Account Type</div>
              <div class="info-card-value">Personal</div>
            </div>
            <div class="info-card">
              <div class="info-card-label">Member Since</div>
              <div class="info-card-value">2026</div>
            </div>
            <div class="info-card">
              <div class="info-card-label">Status</div>
              <div class="info-card-value" style="color:#86efac;">Active ✓</div>
            </div>
            <div class="info-card">
              <div class="info-card-label">Platform</div>
              <div class="info-card-value">rsynzr.cloud</div>
            </div>
          </div>
        </div>`,

      logout: `
        <div class="content-panel">
          <h2>🚪 Logout</h2>
          <p class="panel-sub">Sign out of your current session.</p>
          <div class="orange-box">You will be signed out of your account. Any unsaved changes may be lost.</div>
          <button class="action-btn orange" onclick="window.location.href='/dashboard/logout'">Sign Out Now</button>
        </div>`,

      switch: `
        <div class="content-panel">
          <h2>🔄 Switch Account</h2>
          <p class="panel-sub">Log in with a different account.</p>
          <div class="info-grid" style="margin-bottom:1.25rem;">
            <div class="info-card">
              <div class="info-card-label">Current Account</div>
              <div class="info-card-value">user@rsynzr.cloud</div>
            </div>
          </div>
          <button class="action-btn blue" onclick="window.location.href='/dashboard/switch-account'">Switch Account</button>
        </div>`,

      delete: `
        <div class="content-panel">
          <h2>🗑️ Delete Account</h2>
          <p class="panel-sub">Permanently remove your account and all data.</p>
          <div class="warning-box">⚠️ This action is <strong>permanent and irreversible</strong>. All your data, projects, and settings will be deleted immediately. There is no way to recover your account after deletion.</div>
          <button class="action-btn red" onclick="window.location.href='/dashboard/delete-account'">Delete My Account</button>
        </div>`,

      deactivate: `
        <div class="content-panel">
          <h2>⏸️ Deactivate Account</h2>
          <p class="panel-sub">Temporarily disable your account.</p>
          <div class="orange-box">Deactivating your account will hide your profile and pause all activity. You can reactivate at any time by logging back in.</div>
          <button class="action-btn orange" onclick="window.location.href='/dashboard/deactivate-account'">Deactivate Account</button>
        </div>`,

      coffee: `
        <div class="content-panel">
          <h2>☕ Buy Me a Coffee</h2>
          <p class="panel-sub">Support the development of rsynzr.cloud.</p>
          <div class="coffee-hero">
            <div class="coffee-emoji">☕</div>
            <p>If you enjoy using rsynzr.cloud, consider supporting the project. Every contribution helps keep the platform running and growing.</p>
            <a href="https://donate.rsynzr.cloud" target="_blank" class="action-btn green">Support rsynzr.cloud</a>
          </div>
        </div>`,
    };

    let activeTab = null;

    function selectTab(id, btn) {
      if (id === 'coffee') {
        window.open('https://donate.rsynzr.cloud', '_blank');
        return;
      }

      activeTab = id;

      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.mobile-tab-btn').forEach(b => b.classList.remove('active'));

      if (btn) btn.classList.add('active');

      const mobileBtn = document.querySelector(`.mobile-tab-btn[data-tab="${id}"]`);
      if (mobileBtn) mobileBtn.classList.add('active');

      const area = document.getElementById('contentArea');
      area.innerHTML = content[id] || '<div class="placeholder"><p>Content coming soon.</p></div>';

      const route = tabs.find(t => t.id === id)?.route;
      if (route && history.pushState) {
        history.pushState(null, '', route);
      }
    }

    function buildMobileTabs() {
      const container = document.getElementById('mobileTabs');
      tabs.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'mobile-tab-btn';
        btn.dataset.tab = t.id;
        btn.textContent = t.label;
        btn.onclick = () => selectTab(t.id, null);
        container.appendChild(btn);
      });
    }

    buildMobileTabs();
  </script>

</body>
</html>
